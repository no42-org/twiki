name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: make verify # lint + typecheck + test

  image-scan:
    name: Build image & Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to the security tab
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1
      # Build only (make image uses --load); never pushed on pull requests.
      - run: make image
      - name: Trivy scan (report-only)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: twiki:dev
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # Report-only by design: the runtime is distroless (no package
          # manager), so base-image OS CVEs (e.g. openssl) can't be patched
          # here — only by a newer upstream base. Findings surface in the
          # Security tab via the SARIF upload below; blocking would leave CI
          # red on upstream issues we cannot fix on demand.
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always() # upload even if a future scan is made blocking
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: trivy-results.sarif

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Report advisories; do not block merges on findings without a fix.
      - run: make audit
        continue-on-error: true
