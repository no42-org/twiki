name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: make verify # lint + typecheck + test

  image-scan:
    name: Build image & Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to the security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Build only (make image uses --load); never pushed on pull requests.
      - run: make image
      - name: Trivy scan (report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: twiki:dev
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # Report-only by design: the runtime is distroless (no package
          # manager), so base-image OS CVEs (e.g. openssl) can't be patched
          # here — only by a newer upstream base. Findings surface in the
          # Security tab via the SARIF upload below; blocking would leave CI
          # red on upstream issues we cannot fix on demand.
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always() # upload even if a future scan is made blocking
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Report advisories; do not block merges on findings without a fix.
      - run: make audit
        continue-on-error: true
