name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]

permissions:
  contents: read

concurrency:
  # Serialize per ref so the rolling edge tag/release isn't updated concurrently.
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build, publish & sign
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases; move the rolling `edge` tag
      packages: write # push to GHCR
      id-token: write # cosign keyless (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags for version derivation & latest guard

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # ---- Derive version, channel, image tags via the canonical semver logic
      # (src/semver.ts planRelease, unit-tested) — design D1/D2/D3 ----
      - id: vars
        name: Derive version and tags
        run: make release-plan

      # ---- Build the npm tarball (includes dist/ via package "files") ----
      - id: pack
        name: Build and pack tarball
        run: |
          set -euo pipefail
          # `make pack` builds, stamps the version, and prints the tarball name
          # as its last stdout line.
          tarball="$(make pack VERSION='${{ steps.vars.outputs.relversion }}' | tail -n1)"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          test -s "${tarball}"

      # ---- Build & push the multi-arch image (design D4: no QEMU compile) ----
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Scan the image content before publishing (report-only, same rationale as
      # CI: distroless base CVEs aren't patchable here — see ci.yml). This makes
      # the release self-contained rather than relying on a prior CI run.
      - run: make image
      - name: Trivy scan published image content (report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: twiki:dev
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          provenance: true
          sbom: true

      # ---- Sign the pushed digest (cosign keyless / OIDC) ----
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.vars.outputs.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # ---- Generate an SBOM for the published image ----
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.vars.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: twiki.sbom.spdx.json

      # ---- Publish the GitHub Release ----
      # Stable tag → normal Release with auto Conventional-Commits notes.
      - name: Publish stable release
        if: steps.vars.outputs.channel != 'edge'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.vars.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.vars.outputs.latest == 'true' }}
          files: |
            ${{ steps.pack.outputs.tarball }}
            twiki.sbom.spdx.json

      # main → single rolling `edge` pre-release: move the tag, replace assets.
      - name: Move edge tag
        if: steps.vars.outputs.channel == 'edge'
        run: |
          git tag -f edge
          git push -f origin refs/tags/edge
      - name: Publish edge pre-release
        if: steps.vars.outputs.channel == 'edge'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: edge
          name: "Edge (main) — ${{ steps.vars.outputs.relversion }}"
          body: "Rolling pre-release of the next version, built from `main` (`${{ steps.vars.outputs.short }}`)."
          prerelease: true
          make_latest: false
          files: |
            ${{ steps.pack.outputs.tarball }}
            twiki.sbom.spdx.json
