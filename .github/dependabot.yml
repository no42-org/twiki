version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      octokit:
        patterns: ["@octokit/*"]
      dev-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]
    ignore:
      # @types/node tracks the Node 24 runtime; a major is a deliberate upgrade.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Daily so a patched distroless base digest is proposed promptly (base OS
  # CVEs can only be fixed by an upstream rebuild we pull in via the digest).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: daily
    ignore:
      # The runtime is distroless nodejs24 (its newest Node line), so keep the
      # build base on Node 24 too. A major is a deliberate upgrade, not automatic.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
