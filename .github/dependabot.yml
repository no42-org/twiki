version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      octokit:
        patterns: ["@octokit/*"]
      dev-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Daily so a patched distroless base digest is proposed promptly (base OS
  # CVEs can only be fixed by an upstream rebuild we pull in via the digest).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: daily
